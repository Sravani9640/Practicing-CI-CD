trigger:
- main

pool:
  name: Default

variables:
- group: 'First AWS-Deployment'

steps:

- checkout: self

- task: DownloadSecureFile@1
  name: pemFile
  displayName: "Download AWS PEM File"
  inputs:
    secureFile: 'AWS-CICD.pem'

- script: |
    echo "Repository Files:"
    dir
  displayName: "Verify Repository"

- script: |
    echo "===== Deployment Details ====="
    echo "PEM File: $(pemFile.secureFilePath)"
    echo "EC2 User: $(EC2_USER)"
    echo "EC2 IP: $(EC2_IP)"
    echo "=============================="

    scp -v -o StrictHostKeyChecking=no -i "$(pemFile.secureFilePath)" index.html $(EC2_USER)@$(EC2_IP):/home/ec2-user/
  displayName: "Copy Website"

- script: |
    ssh -v -o StrictHostKeyChecking=no -i "$(pemFile.secureFilePath)" $(EC2_USER)@$(EC2_IP) "sudo cp /home/ec2-user/index.html $(WEB_PATH)/index.html"
  displayName: "Deploy Website"